    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#059669"/>
    </marker>
    <style>
      text {
        font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        fill: #0F172A;
      }
      .eyebrow { font-size: 16px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; fill: #475569; }
      .title { font-size: 34px; font-weight: 800; }
      .subtitle { font-size: 18px; fill: #475569; }
      .sectionTitle { font-size: 24px; font-weight: 800; }
      .stepTitle { font-size: 17px; font-weight: 700; }
      .body { font-size: 14px; fill: #334155; }
      .small { font-size: 12px; fill: #475569; }
      .badge { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    </style>
