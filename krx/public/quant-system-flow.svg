  <rect width="1600" height="1220" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="48" y="40" width="1504" height="1140" rx="32" fill="#FFFFFF"/>
  </g>

  <text x="92" y="95" class="eyebrow">QUANT EXECUTION FLOW</text>
  <text x="92" y="142" class="title">퀀트/코인 퀀트 실행 순서</text>
  <text x="92" y="176" class="subtitle">현재 코드 기준으로 탭 진입, 전역 상태, 프록시, backend-go, 뉴스/LSTM 동기화까지 한 장으로 정리한 흐름도</text>

  <rect x="80" y="220" width="690" height="520" rx="28" fill="url(#panelBlue)" stroke="#BFDBFE"/>
  <rect x="830" y="220" width="690" height="520" rx="28" fill="url(#panelGreen)" stroke="#A7F3D0"/>
  <rect x="80" y="780" width="1440" height="320" rx="28" fill="url(#panelAmber)" stroke="#FCD34D"/>

  <text x="110" y="275" class="sectionTitle">1. 코인 퀀트 실행</text>
  <text x="860" y="275" class="sectionTitle">2. 주식 퀀트 실행</text>
  <text x="110" y="835" class="sectionTitle">3. 자동 동기화 / 배치 / 보정</text>

  <rect x="110" y="315" width="170" height="82" rx="18" fill="#FFFFFF" stroke="#93C5FD"/>
  <text x="128" y="346" class="badge" fill="#2563EB">STEP 01</text>
  <text x="128" y="374" class="stepTitle">상단 탭 진입</text>
  <text x="128" y="394" class="body">HomeContainer가</text>
  <text x="128" y="413" class="body">코인 퀀트 탭을 렌더</text>

  <rect x="320" y="315" width="170" height="82" rx="18" fill="#FFFFFF" stroke="#93C5FD"/>
  <text x="338" y="346" class="badge" fill="#2563EB">STEP 02</text>
  <text x="338" y="374" class="stepTitle">거래소 복원</text>
  <text x="338" y="394" class="body">zustand store에서</text>
  <text x="338" y="413" class="body">bithumb/upbit 복원</text>

  <rect x="530" y="315" width="210" height="82" rx="18" fill="#FFFFFF" stroke="#93C5FD"/>
  <text x="548" y="346" class="badge" fill="#2563EB">STEP 03</text>
  <text x="548" y="374" class="stepTitle">최근 시도 확인</text>
  <text x="548" y="394" class="body">lastAttemptedAt가 60초 이내면</text>
  <text x="548" y="413" class="body">재요청 없이 기존 상태 사용</text>

  <rect x="110" y="455" width="200" height="92" rx="18" fill="#FFFFFF" stroke="#93C5FD"/>
  <text x="128" y="486" class="badge" fill="#2563EB">STEP 04</text>
  <text x="128" y="514" class="stepTitle">Next API 프록시 호출</text>
  <text x="128" y="534" class="body">/api/bithumb/screener</text>
  <text x="128" y="553" class="body">또는 /api/upbit/screener</text>

  <rect x="350" y="455" width="190" height="92" rx="18" fill="#FFFFFF" stroke="#93C5FD"/>
  <text x="368" y="486" class="badge" fill="#2563EB">STEP 05</text>
  <text x="368" y="514" class="stepTitle">limit clamp</text>
  <text x="368" y="534" class="body">프록시에서 추천 수를</text>
  <text x="368" y="553" class="body">1~3 범위로 강제</text>

  <rect x="580" y="455" width="160" height="92" rx="18" fill="#FFFFFF" stroke="#93C5FD"/>
  <text x="598" y="486" class="badge" fill="#2563EB">STEP 06</text>
  <text x="598" y="514" class="stepTitle">backend-go</text>
  <text x="598" y="534" class="body">빗썸/업비트</text>
  <text x="598" y="553" class="body">퀀트 계산</text>

  <rect x="110" y="600" width="270" height="96" rx="18" fill="#FFFFFF" stroke="#93C5FD"/>
  <text x="128" y="631" class="badge" fill="#2563EB">STEP 07</text>
  <text x="128" y="659" class="stepTitle">응답 저장</text>
  <text x="128" y="679" class="body">data, error, lastAttemptedAt을 store에 기록</text>
  <text x="128" y="698" class="body">실패해도 즉시 재시도 루프는 막힘</text>

  <rect x="420" y="600" width="320" height="96" rx="18" fill="#FFFFFF" stroke="#93C5FD"/>
  <text x="438" y="631" class="badge" fill="#2563EB">STEP 08</text>
  <text x="438" y="659" class="stepTitle">업비트만 WebSocket 보강</text>
  <text x="438" y="679" class="body">상단 추천 1~3개 코인의 실시간 가격만 별도 반영</text>
  <text x="438" y="698" class="body">빗썸은 REST 스냅샷 기준 유지</text>

  <line x1="280" y1="356" x2="320" y2="356" stroke="#2563EB" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="490" y1="356" x2="530" y2="356" stroke="#2563EB" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="635" y1="397" x2="635" y2="455" stroke="#2563EB" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="310" y1="501" x2="350" y2="501" stroke="#2563EB" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="540" y1="501" x2="580" y2="501" stroke="#2563EB" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="660" y1="547" x2="660" y2="600" stroke="#2563EB" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="380" y1="648" x2="420" y2="648" stroke="#2563EB" stroke-width="3" marker-end="url(#arrowBlue)"/>

  <rect x="860" y="315" width="170" height="82" rx="18" fill="#FFFFFF" stroke="#6EE7B7"/>
  <text x="878" y="346" class="badge" fill="#059669">STEP 01</text>
  <text x="878" y="374" class="stepTitle">퀀트 탭 진입</text>
  <text x="878" y="394" class="body">QuantPage가</text>
  <text x="878" y="413" class="body">zustand 상태 조회</text>

  <rect x="1070" y="315" width="210" height="82" rx="18" fill="#FFFFFF" stroke="#6EE7B7"/>
  <text x="1088" y="346" class="badge" fill="#059669">STEP 02</text>
  <text x="1088" y="374" class="stepTitle">최근 시도 확인</text>
  <text x="1088" y="394" class="body">lastAttemptedAt 60초 이내면</text>
  <text x="1088" y="413" class="body">기존 rank/report 재사용</text>

  <rect x="1320" y="315" width="170" height="82" rx="18" fill="#FFFFFF" stroke="#6EE7B7"/>
  <text x="1338" y="346" class="badge" fill="#059669">STEP 03</text>
  <text x="1338" y="374" class="stepTitle">동시 요청</text>
  <text x="1338" y="394" class="body">rank / report /</text>
  <text x="1338" y="413" class="body">macro 프록시 호출</text>

  <rect x="860" y="455" width="210" height="92" rx="18" fill="#FFFFFF" stroke="#6EE7B7"/>
  <text x="878" y="486" class="badge" fill="#059669">STEP 04</text>
  <text x="878" y="514" class="stepTitle">limit clamp</text>
  <text x="878" y="534" class="body">프록시에서 추천 개수를</text>
  <text x="878" y="553" class="body">1~3으로 강제</text>

  <rect x="1110" y="455" width="180" height="92" rx="18" fill="#FFFFFF" stroke="#6EE7B7"/>
  <text x="1128" y="486" class="badge" fill="#059669">STEP 05</text>
  <text x="1128" y="514" class="stepTitle">뉴스 레짐</text>
  <text x="1128" y="534" class="body">risk-on / risk-off</text>
  <text x="1128" y="553" class="body">확률 생성</text>

  <rect x="1330" y="455" width="160" height="92" rx="18" fill="#FFFFFF" stroke="#6EE7B7"/>
  <text x="1348" y="486" class="badge" fill="#059669">STEP 06</text>
  <text x="1348" y="514" class="stepTitle">종목 뉴스</text>
  <text x="1348" y="534" class="body">개별 종목의</text>
  <text x="1348" y="553" class="body">news_score 계산</text>

  <rect x="860" y="600" width="210" height="96" rx="18" fill="#FFFFFF" stroke="#6EE7B7"/>
  <text x="878" y="631" class="badge" fill="#059669">STEP 07</text>
  <text x="878" y="659" class="stepTitle">LSTM 예측 로드</text>
  <text x="878" y="679" class="body">lstm_predictions_latest.json</text>
  <text x="878" y="698" class="body">및 tuning snapshot 반영</text>

  <rect x="1110" y="600" width="190" height="96" rx="18" fill="#FFFFFF" stroke="#6EE7B7"/>
  <text x="1128" y="631" class="badge" fill="#059669">STEP 08</text>
  <text x="1128" y="659" class="stepTitle">최종 점수 합산</text>
  <text x="1128" y="679" class="body">가격, 거래대금, 뉴스,</text>
  <text x="1128" y="698" class="body">LSTM, NXT 점수 통합</text>

  <rect x="1340" y="600" width="150" height="96" rx="18" fill="#FFFFFF" stroke="#6EE7B7"/>
  <text x="1358" y="631" class="badge" fill="#059669">STEP 09</text>
  <text x="1358" y="659" class="stepTitle">응답 저장</text>
  <text x="1358" y="679" class="body">store에 rank/report</text>
  <text x="1358" y="698" class="body">macro 저장</text>

  <line x1="1030" y1="356" x2="1070" y2="356" stroke="#059669" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <line x1="1280" y1="356" x2="1320" y2="356" stroke="#059669" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <line x1="1405" y1="397" x2="1405" y2="455" stroke="#059669" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <line x1="1070" y1="501" x2="1110" y2="501" stroke="#059669" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <line x1="1290" y1="501" x2="1330" y2="501" stroke="#059669" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <line x1="960" y1="547" x2="960" y2="600" stroke="#059669" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <line x1="1070" y1="648" x2="1110" y2="648" stroke="#059669" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <line x1="1300" y1="648" x2="1340" y2="648" stroke="#059669" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <rect x="110" y="875" width="220" height="92" rx="18" fill="#FFFFFF" stroke="#F59E0B"/>
  <text x="128" y="906" class="badge" fill="#B45309">SCHEDULE</text>
  <text x="128" y="934" class="stepTitle">자동 스케줄러</text>
  <text x="128" y="954" class="body">07:50 장전 sync</text>
  <text x="128" y="973" class="body">20:10 장마감 후 sync</text>

  <rect x="380" y="875" width="240" height="92" rx="18" fill="#FFFFFF" stroke="#F59E0B"/>
  <text x="398" y="906" class="badge" fill="#B45309">NEWS</text>
  <text x="398" y="934" class="stepTitle">뉴스 백필 / 윈도우</text>
  <text x="398" y="954" class="body">전일 장마감 후 ~ 당일 장전</text>
  <text x="398" y="973" class="body">뉴스 집계와 정밀 시각 보강</text>

  <rect x="670" y="875" width="220" height="92" rx="18" fill="#FFFFFF" stroke="#F59E0B"/>
  <text x="688" y="906" class="badge" fill="#B45309">MARKET</text>
  <text x="688" y="934" class="stepTitle">KRX / NXT 보정</text>
  <text x="688" y="954" class="body">일봉, 시총, NXT snapshot</text>
  <text x="688" y="973" class="body">누락 시 자동 수집</text>

  <rect x="940" y="875" width="230" height="92" rx="18" fill="#FFFFFF" stroke="#F59E0B"/>
  <text x="958" y="906" class="badge" fill="#B45309">MODEL</text>
  <text x="958" y="934" class="stepTitle">LSTM 재생성 조건</text>
  <text x="958" y="954" class="body">예측 파일 날짜 불일치 또는</text>
  <text x="958" y="973" class="body">item_count 부족 시 재생성</text>

  <rect x="1220" y="875" width="270" height="92" rx="18" fill="#FFFFFF" stroke="#F59E0B"/>
  <text x="1238" y="906" class="badge" fill="#B45309">REQUEST FALLBACK</text>
  <text x="1238" y="934" class="stepTitle">첫 요청 lazy sync</text>
  <text x="1238" y="954" class="body">서버가 꺼져 있었으면 첫 /api/quant 요청에서</text>
  <text x="1238" y="973" class="body">누락 구간만 보정 후 응답</text>

  <line x1="330" y1="921" x2="380" y2="921" stroke="#B45309" stroke-width="3" marker-end="url(#arrowSlate)"/>
  <line x1="620" y1="921" x2="670" y2="921" stroke="#B45309" stroke-width="3" marker-end="url(#arrowSlate)"/>
  <line x1="890" y1="921" x2="940" y2="921" stroke="#B45309" stroke-width="3" marker-end="url(#arrowSlate)"/>
  <line x1="1170" y1="921" x2="1220" y2="921" stroke="#B45309" stroke-width="3" marker-end="url(#arrowSlate)"/>

  <rect x="110" y="1010" width="1380" height="58" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="136" y="1045" class="body">핵심 상태 저장 지점: coinQuantStore / quantPageStore. 실패한 요청도 lastAttemptedAt으로 기록해서 즉시 재시도 폭주를 막고, 탭 전환 후에도 마지막 조건과 응답을 그대로 유지합니다.</text>

  <text x="110" y="1142" class="small">파일 기준: HomeContainer.tsx, CoinQuantPage.tsx, CoinMarketScreener.tsx, QuantPage.tsx, coinQuantStore.ts, quantPageStore.ts, backend-go/internal/ops/scheduler.go, backend-go/internal/ops/sync.go, backend-go/internal/quant/service.go</text>
